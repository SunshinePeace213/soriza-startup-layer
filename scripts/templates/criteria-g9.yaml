  - {id: g9-1, desc: "<≥N of 5 PoC users do X -- the falsifiable threshold for OPEN assumption #1>", check: human}
  - {id: g9-2, desc: "<concrete threshold tied to OPEN assumption #2>", check: human}
  - {id: g9-3, desc: "Founder makes the keep-building / pivot / kill call having read all 5 reactions; all open predictions resolved", check: human}
